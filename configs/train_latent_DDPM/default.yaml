defaults:
  - _self_

seed: 42

# Train dataset
dataset_source: ${dataset.slug}
dataset: ${dataset}

# Used only when dataset_source=h5
h5_dataset:
    path: null
    apply_log: True
    apply_norm: True
    apply_split: True

# Output folder for this DDPM training run
id_label: ''
output_dir: "${dataset.paths.ddpm_root}/latent_ddpm_${.latent_noise_mode}_ae_${.autoencoder_kind}_${.dataset_source}${.id_label}"

# Stage 2 A/B protocol
# baseline: z_noisy = z + sigma * eps_z
# induced:  z_noisy = E(x + sigma * eps_x)
latent_noise_mode: baseline

# Frozen encoder selected after Stage 1 encoder validation
autoencoder_kind: noise_consistency
autoencoder_checkpoint_path: "${dataset.paths.autoencoder_root}/${dataset.encoder.checkpoint_run}/autoencoder_checkpoint.pt"

# Dataloader
batch_size: 32
num_workers: 4
in_memory: True

# DDPM parameters
DDPM_params:
    base_dim: 16
    deep: 3 # maximum 3

# Train loop
lr: 1e-4
n_epochs: 30
patience: 10
grad_clip_val: 100000
scheduler_mode: null  # ['warmup', 'cos', 'comb', 'plateau', null]

# Parameters for scheduler_mode = 'plateau'
plateau_params:
    patience: 5
    threshold: 0.001
    factor: 0.8
warmup_params:
    threshold: 0.1 # 10%

save_interval: 'last_only'

# Optional report-only score statistics for future runs. Disabled by default to
# avoid adding validation cost to existing experiment protocol.
score_stats:
    enabled: false
    max_score_stat_samples: 512
    score_stat_seed: 42
    score_stat_every_n_epochs: 1

# Build the DDPM/encoder stack and run a dummy forward without loading a real dataset.
# Intended only for quick multi-dataset smoke checks.
smoke_model_only: false
