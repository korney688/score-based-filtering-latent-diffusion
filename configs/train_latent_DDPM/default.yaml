defaults:
  - _self_

seed: 42

# Train dataset
dataset_source: mnist

# Used only when dataset_source=h5
h5_dataset:
    path: null
    apply_log: True
    apply_norm: True
    apply_split: True

# Output folder for this DDPM training run
id_label: ''
output_dir: "${hydra:runtime.cwd}/outputs/ddpm/latent_ddpm_${.latent_noise_mode}_${.autoencoder_kind}_${.dataset_source}${.id_label}"

# Stage 2 A/B protocol
# baseline: z_noisy = z + sigma * eps_z
# induced:  z_noisy = E(x + sigma * eps_x)
latent_noise_mode: baseline

# Frozen encoder selected after Stage 1 encoder validation
autoencoder_kind: noise_consistency
autoencoder_checkpoint_path: "./models/autoencoders/ae_noise_consistency_mnist/autoencoder_checkpoint.pt"

# Dataloader
batch_size: 32
num_workers: 4
in_memory: True

# DDPM parameters
DDPM_params:
    base_dim: 16
    deep: 3 # maximum 3

# Train loop
lr: 1e-4
n_epochs: 30
patience: 10
grad_clip_val: 100000
scheduler_mode: null  # ['warmup', 'cos', 'comb', 'plateau', null]

# Parameters for scheduler_mode = 'plateau'
plateau_params:
    patience: 5
    threshold: 0.001
    factor: 0.8
warmup_params:
    threshold: 0.1 # 10%

save_interval: 'last_only'
