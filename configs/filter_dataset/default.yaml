defaults:
  - _self_

seed: 42

# Stage 3 explicitly selects which validated latent-DDPM branch is used.
ddpm_branch: baseline # baseline | induced

# Stage 3 keeps only index selections; no filtered H5 dataset is created.
filter_mode: top_k # top_k | quantile
keep_ratio: 0.1
quantile_low: 0.0
quantile_high: 0.1

# Use the same sigma interval as Stage 2 latent-DDPM score validation.
sigma_min: 0.1
sigma_max: 0.8

batch_size: 256
num_workers: 0
overwrite: false

checkpoint_name: epoch_030.pth
checkpoint_roots:
  baseline: outputs/ddpm/latent_ddpm_baseline_ae_noise_consistency_mnist
  induced: outputs/ddpm/latent_ddpm_induced_ae_noise_consistency_mnist

model:
  base_dim: 16
  deep: 3
  autoencoder_kind: noise_consistency
  autoencoder_checkpoint_path: models/autoencoders/ae_noise_consistency_mnist/autoencoder_checkpoint.pt

output_root: experiments/exp_005_filtering
