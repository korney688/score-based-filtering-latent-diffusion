dataset: imagenet100
output_root: experiments/imagenet100/exp_007_drunet
checkpoint_root: checkpoints/imagenet100/drunet

runs:
  full_sigma25:
    mode: full
    selected_indices: null
  quantile10_sigma25:
    mode: filtered
    selected_indices: experiments/imagenet100/exp_005_filtering/quantile/10/selected_indices.npy
  topk10_sigma25:
    mode: filtered
    selected_indices: experiments/imagenet100/exp_005_filtering/topk/10/selected_indices.npy

training:
  epochs: 15
  batch_size: 64
  lr: 1.0e-4
  optimizer: Adam
  weight_decay: 0.0
  scheduler: null
  seed: 42
  sigma_mode: fixed
  fixed_sigma: 0.09803921568627451
  sigma_min: 0.09803921568627451
  sigma_max: 0.09803921568627451
  num_workers: 0

model:
  implementation: official_dpir_unetres
  official_import_required: false
  in_channels: 3
  features: 64
  num_layers: 5
  official: true
  nc: [64, 128, 256, 512]
  nb: 4
  act_mode: R
  downsample_mode: strideconv
  upsample_mode: convtranspose
