defaults:
  - _self_

slug: cifar10
name: CIFAR-10
torchvision_name: CIFAR10
channels: 3
in_channels: 3
out_channels: 3
image_size: 32
num_classes: 10
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]
download: false

encoder:
  name: noise_consistency_large
  latent_dim: 128
  checkpoint_run: noise_consistency_large_latent128

encoder_validation:
  candidates:
    noise_consistency:
      kind: noise_consistency
      architecture: noise_consistency_large
      latent_dim: 128
      checkpoint_run: noise_consistency_large_latent128

latent_ddpm:
  runs:
    baseline:
      latent_noise_mode: baseline
      checkpoint_run: latent_ddpm_baseline_ae_noise_consistency_cifar10_run1
    induced:
      latent_noise_mode: induced
      checkpoint_run: latent_ddpm_induced_ae_noise_consistency_cifar10_run1

latent_ddpm_validation:
  runs:
    baseline:
      latent_noise_mode: baseline
      checkpoint_run: latent_ddpm_baseline_ae_noise_consistency_cifar10_run1
    induced:
      latent_noise_mode: induced
      checkpoint_run: latent_ddpm_induced_ae_noise_consistency_cifar10_run1

paths:
  data_root: ${hydra:runtime.cwd}/data
  experiments_root: ${hydra:runtime.cwd}/experiments/${dataset.slug}
  outputs_root: ${hydra:runtime.cwd}/outputs/${dataset.slug}
  checkpoints_root: ${hydra:runtime.cwd}/checkpoints/${dataset.slug}
  autoencoder_root: ${dataset.paths.checkpoints_root}/autoencoders
  ddpm_root: ${dataset.paths.checkpoints_root}/ddpm
